hosts:
  eyebrow: "Your guides"
  title: "Meet the circle holding this journey"
  people:
    - image: "images/viviana-dumas.jpg"
      alt: "Viviana Dumas"
      name: "Viviana Dumas"
      role: "Ceremony & ancestral healing"
      bio: "Born and raised in Cusco, Viviana is a rare bridge between the indigenous world and Western clinical psychology. Trained directly under local Curanderas in traditional Andean healing, she pairs that lineage with degrees in Anthropology and Transpersonal Psychology, and over 25 years guiding people through trauma and transformation. She served as Executive Director of Niños del Sol, and still actively supports vulnerable children in the Sacred Valley."
    - image: "images/avishai-pearlson-2.jpg"
      alt: "Avishai Pearlson"
      image_position: "50% 20%"
      name: "Avishai Pearlson"
      role: "Bodywork & nourishment"
      bio: "Raised on an Israeli kibbutz and having taught across four continents, Avishai is a certified Breema Bodywork practitioner and instructor, including years teaching at the University of Oregon, devoted to the art of being present. A longtime student of meditation, permaculture, and holistic living, he also brings his skills as a conscious, health-focused chef, making sure the group is nourished in body and soul with organic, locally sourced food throughout the journey."
    - image: "images/ricky-trigalo.jpg"
      alt: "Ricky Trigalo"
      name: "Ricky Trigalo"
      role: "Integration & functional wellness"
      bio: "Founder of Life Changing Wellness and a certified Psychedelic Integration Practitioner (ICEERS Academy), Ricky has spent over a decade working alongside Peruvian shamans and immersed in indigenous healing traditions. She holds the integration threads of this journey - meditation, intuitive writing, and the work of turning ceremony into lasting change."

faq:
  eyebrow: "Good to know"
  title: "Frequently asked questions"
  items:
    - question: "Do I need prior ceremony experience?"
      answer: "No prior experience is required. What matters more is an open heart and a willingness to prepare. We'll send pre-trip guidance in the weeks before departure so you arrive ready in body and mind."
    - question: "What are Kambo and Wachuma, and are they safe for me?"
      answer: "Kambo is a traditional Amazonian cleansing practice, and Wachuma (San Pedro) is an Andean plant medicine used in ceremony for reflection and insight. Both are held by experienced local facilitators, but they are not right for everyone - certain heart conditions, pregnancy, and some medications require caution. After you reserve your spot, we'll send a health intake form and ask you to disclose your full medical history and any medications so our facilitators can advise you individually; if in doubt, please also check with your own doctor before traveling."
    - question: "How is integration supported after ceremony?"
      answer: "Ricky, a certified Psychedelic Integration Practitioner, leads dedicated integration sessions throughout the journey - meditation, intuitive writing, and group processing - so what surfaces in ceremony has somewhere to go, both during the trip and after you return home."
    - question: "What's the altitude like - will I be okay?"
      answer: "Urubamba sits at about 2,870m (9,400ft) and Cusco at about 3,400m (11,150ft). We build the first days around gentle pacing, rest, and hydration to help you adjust, and we will always have coca leaves available to chew or make tea with, which helps with adjusting to the altitude. Most people acclimatize well, but if you have a heart or respiratory condition, please check with your doctor before booking."
    - question: "Can I arrive early or stay longer?"
      answer: "Yes, many guests choose to extend their stay before or after the journey. Let us know when you reserve your spot and we can help you arrange extra nights and airport transfers."
    - question: "What should I pack?"
      answer: "Think layers, warm days and chilly nights, comfortable hiking shoes, a rainy jacket, sunglasses, a small day pack, sandals, mosquito repellent, a reusable water bottle, a journal, sun protection, and any personal medications. We'll send a full packing list once you've reserved your spot."

