itinerary:
  eyebrow: "Day by day"
  title: "The retreat itinerary"
  lede: "A full arc, from arrival to closing circle, each day builds on the one before."
  days:
    - tag: "Day 1 · Thu Dec 10 - Arrival"
      title: "Welcoming fire"
      text: "Afternoon pickup and arrival in Urubamba, a welcoming circle, a nurturing first dinner, and an evening fire ritual with Viviana and Ricky to set our collective intention."
    - tag: "Day 2 · Fri Dec 11"
      title: "Hummingbird Sanctuary & mini vision quest"
      text: "Morning at Hummingbird Sanctuary, then a hike into the high Andes for a guided walking meditation, solitude, and communion with the mountain, followed by an integration meeting."
    - tag: "Day 3 · Sat Dec 12"
      title: "Kambo & cacao ceremony"
      text: "Breema Bodywork, Kambo ceremony, free time or a hike through the Yucay Inca terraces, cacao ceremony, and music around the fire."
    - tag: "Day 4 · Sun Dec 13"
      title: "Kundalini yoga & sweat lodge"
      text: "An opening talk and Kundalini Yoga with Viviana, followed by the building of the fire and a traditional sweat lodge (temazcal), cleansing body, mind, and spirit."
    - tag: "Day 5 · Mon Dec 14"
      title: "Wachuma (San Pedro) medicine"
      text: "A gentle morning of yoga followed by Wachuma medicine ceremony, held with care through the afternoon and evening."
    - tag: "Day 6 · Tue Dec 15"
      title: "Integration & sound healing"
      text: "Breema Bodywork, meditation, relaxation and intuitive writing, Sound Healing journey."
    - tag: "Day 7 · Wed Dec 16"
      title: "Urubamba Market, Moray/Salineras & Despacho ceremony"
      text: "Morning yoga, exploring the Urubamba Weekly open market, visit the Moray Inca terraces, and Salineras salt pools, hike to the valley, then closing the day with a Despacho ceremony led by Q'ero shamans."
    - tag: "Day 8 · Thu Dec 17"
      title: "Machu Picchu"
      text: "A scenic train ride to Aguas Calientes, a guided visit to Machu Picchu, time to explore Aguas Calientes and the Inca town market, then a train back to Urubamba."
    - tag: "Day 9 · Fri Dec 18"
      title: "Lares Hot Springs"
      text: "Breathtaking ride to Lares Hot Springs and a hike to the magnificent waterfalls on the way. Optional free time in Pisac."
    - tag: "Day 10 · Sat Dec 19"
      title: "Parque de las Papas & Pisac"
      text: "A day with the local Andean villagers, exploring the fascinating Parque de las Papas, free time in Pisac, and traveling onward to Cusco (Hotel Amaru, San Blas), for the final two nights."
    - tag: "Day 11 · Sun Dec 20"
      title: "Cusco & closing celebration"
      text: "Visit the Sacsayhuamán archeology site, a free afternoon or city tour/San Pedro market, and a closing dinner with a live show and dancing."
    - tag: "Day 12 · Mon Dec 21 - Departure"
      title: "Closing circle & goodbyes"
      text: "A final breakfast, closing circle, and farewell lunch together before we say our goodbyes, whether you're heading home or extending your stay in Peru."

