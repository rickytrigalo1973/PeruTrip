invitation:
  eyebrow: "Small Intimate Circle"
  title: "Twelve days. A small circle. Deepening connection to Myself, Community and Nature."
  paragraph_1: "There is a valley in the Andes where the mountains are alive, where rivers carry the memory of ancient rites, and where the medicine of the Q'ero shamans still moves through fire, plant, and song."
  paragraph_2: "This journey was created for people who are ready to go deeper than a vacation, to be held, in ceremony and in community, by a team who understands both the body and the spirit."
  image: "images/q-ero-shamans-holding-ceremony.jpg"
  image_alt: "Q'ero shamans holding ceremony"

forwho:
  eyebrow: "Who this journey is for"
  title: "You look well on the outside. But something in you is asking for more."
  lede: "Many of the people drawn to this journey are high-functioning, successful, and yet deeply tired - carrying stress, disconnection, or unresolved experiences that everyday life doesn't leave room to face."
  cards:
    - title: "You feel most yourself in nature"
      text: "Mountains, rivers, and open sky restore you in a way daily life doesn't, and you're drawn to healing that happens outdoors, at altitude, in the presence of the Andes."
    - title: "You want expert, grounded facilitation"
      text: "Not just a retreat, but a team that understands the body, the nervous system, and how to integrate what journey brings up."
    - title: "You're carrying something unresolved"
      text: "Stress, grief, burnout, or past experiences that are keeping you from living your dream."
    - title: "You're ready to be part of a small healing circle"
      text: "You want intimacy and depth, not a crowd, and you're willing to show up fully for twelve days of life-transforming activities."
    - title: "You feel the pull toward rituals and ceremonies"
      text: "You're curious about or already familiar with plant medicines, rituals, or shamanic practice, and you're ready to go deeper with proper support."

